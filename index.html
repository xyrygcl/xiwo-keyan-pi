<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 微课平台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f0f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
.navbar { background: #1a73e8; color: white; }
.navbar a { color: white; margin-right: 15px; }
.container { margin-top: 50px; max-width: 1000px; }
.card { border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
.card:hover { transform: translateY(-5px); }
.card img { border-radius: 8px; }
.slide-content { font-size: 1rem; line-height: 1.6; color: #444; margin-top: 10px; }
.input-group { margin-bottom: 15px; }
.badge-status { font-size: 0.9rem; }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="#" onclick="showPage('dashboard')">AI 微课平台</a>
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a href="#" class="nav-link" onclick="showPage('dashboard')">首页</a></li>
      <li class="nav-item"><a href="#" class="nav-link" onclick="showPage('upload')">上传 PPT</a></li>
      <li class="nav-item"><a href="#" class="nav-link" onclick="showPage('profile')">个人中心</a></li>
      <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">退出</a></li>
    </ul>
  </div>
</nav>

<!-- 页面容器 -->
<div class="container">

  <!-- 登录页 -->
  <div id="login" class="d-none">
    <h2 class="text-center mb-4">登录 AI 微课平台</h2>
    <form id="loginForm" class="mx-auto" style="max-width: 400px;">
      <input type="email" class="form-control mb-3" placeholder="邮箱" required>
      <input type="password" class="form-control mb-3" placeholder="密码" required>
      <button class="btn btn-primary w-100" type="submit">登录</button>
    </form>
  </div>

  <!-- 仪表盘页 -->
  <div id="dashboard" class="d-none">
    <h3>我的微课</h3>
    <button class="btn btn-success mb-3" onclick="showPage('upload')">生成新微课</button>
    <div id="videoList" class="row">
      <!-- 视频卡片渲染 -->
    </div>
  </div>

  <!-- 上传 PPT 页 -->
  <div id="upload" class="d-none">
    <h3>上传 PPT</h3>
    <div class="mb-3">
      <input type="file" id="pptFile" class="form-control" accept=".pptx">
    </div>
    <div class="mb-3">
      <label for="templateSelect" class="form-label">选择模板</label>
      <select id="templateSelect" class="form-select">
        <option value="classic">经典卡片</option>
        <option value="modern">现代风格</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="generateMockVideo()">生成微课</button>
    <div id="uploadStatus" class="mt-3"></div>
  </div>

  <!-- 视频播放页 -->
  <div id="player" class="d-none">
    <h3 id="playerTitle">微课播放</h3>
    <video id="videoPlayer" class="w-100" controls></video>
    <div class="mt-3" id="videoContent"></div>
    <button class="btn btn-secondary mt-3" onclick="showPage('dashboard')">返回首页</button>
  </div>

  <!-- 个人中心 -->
  <div id="profile" class="d-none">
    <h3>个人中心</h3>
    <p>用户名：Alice (Mock)</p>
    <p>邮箱：alice@example.com</p>
    <button class="btn btn-warning" onclick="showPage('dashboard')">返回首页</button>
  </div>

</div>

<script>
// 页面管理
function showPage(page) {
  ['login','dashboard','upload','player','profile'].forEach(p => {
    document.getElementById(p).classList.add('d-none');
  });
  document.getElementById(page).classList.remove('d-none');
}

// 模拟登录
document.getElementById('loginForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  showPage('dashboard');
  renderVideoList();
});

// 模拟退出
function logout() {
  showPage('login');
}

// Mock 视频数据
const videosData = [
  {id:101,ppt_name:"TCP基础.pptx",created_at:"2026-05-12 14:30",thumbnail_url:"https://images.unsplash.com/photo-1581091215365-fc7d6b992fb2?auto=format&fit=crop&w=400&q=80",video_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",status:"完成"},
  {id:102,ppt_name:"HTTP协议.pptx",created_at:"2026-05-13 10:15",thumbnail_url:"https://images.unsplash.com/photo-1593642532973-d31b6557fa68?auto=format&fit=crop&w=400&q=80",video_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",status:"处理中"},
  {id:103,ppt_name:"IP数据报.pptx",created_at:"2026-05-14 09:20",thumbnail_url:"https://images.unsplash.com/photo-1537432376769-00a5e7b7da25?auto=format&fit=crop&w=400&q=80",video_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",status:"完成"}
];

// 渲染视频列表
function renderVideoList() {
  const container = document.getElementById('videoList');
  container.innerHTML = '';
  videosData.forEach(v=>{
    const col = document.createElement('div');
    col.className = 'col-md-4 mb-3';
    col.innerHTML = `
      <div class="card">
        <img src="${v.thumbnail_url}" class="card-img-top">
        <div class="card-body">
          <h5 class="card-title">${v.ppt_name}</h5>
          <p class="card-text">生成时间：${v.created_at}</p>
          <span class="badge bg-${v.status==='完成'?'success':'secondary'} badge-status">${v.status}</span>
          <button class="btn btn-primary mt-2" onclick="playVideo('${v.video_url}','${v.ppt_name}')">播放</button>
        </div>
      </div>
    `;
    container.appendChild(col);
  });
}

// 播放视频
function playVideo(url,title) {
  showPage('player');
  const player = document.getElementById('videoPlayer');
  const content = document.getElementById('videoContent');
  player.src = url;
  document.getElementById('playerTitle').innerText = title;
  content.innerHTML = "<p>这里可以显示字幕或 PPT 内容（Mock）</p>";
}

// 模拟生成微课
function generateMockVideo() {
  const status = document.getElementById('uploadStatus');
  const fileInput = document.getElementById('pptFile');
  if(!fileInput.files.length){ status.innerText="请先选择 PPT"; return;}
  status.innerText = "生成中...";
  setTimeout(()=>{
    const mockVideo = {
      id:Date.now(),
      ppt_name:fileInput.files[0].name,
      created_at:new Date().toLocaleString(),
      thumbnail_url:"https://images.unsplash.com/photo-1605902711622-cfb43c44329e?auto=format&fit=crop&w=400&q=80",
      video_url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
      status:"完成"
    };
    videosData.unshift(mockVideo);
    status.innerText = "生成完成！";
    showPage('dashboard');
    renderVideoList();
  },2000);
}

// 初始页面
showPage('login');
</script>

</body>
</html>
