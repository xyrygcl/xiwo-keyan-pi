<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希沃课研π - 自动微课生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-purple-700 mb-6">希沃课研π</h1>
        <p class="text-gray-600 text-center mb-8">上传PPT，一键生成音视频同步的精品微课</p>
        
        <div id="upload-section">
            <label class="block mb-2 text-sm font-medium text-gray-700">选择PPT文件（.pptx）</label>
            <input type="file" id="ppt-file" accept=".pptx" class="block w-full text-sm text-gray-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-purple-50 file:text-purple-700
                hover:file:bg-purple-100 mb-6">
            <button id="upload-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                开始生成微课
            </button>
        </div>
        
        <div id="progress-section" class="hidden">
            <div class="mb-4">
                <div class="flex justify-between mb-1">
                    <span class="text-sm font-medium text-purple-700">生成进度</span>
                    <span id="progress-text" class="text-sm font-medium text-purple-700">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-purple-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <p id="status-text" class="text-center text-gray-600">正在上传PPT...</p>
        </div>
        
        <div id="result-section" class="hidden">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                <p class="text-green-700 font-medium text-center">🎉 微课生成成功！</p>
            </div>
            <a id="download-btn" href="#" download="微课视频.mp4" class="w-full block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                下载视频
            </a>
            <button id="reset-btn" class="w-full mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-full transition duration-300">
                生成新的微课
            </button>
        </div>
        
        <div id="error-section" class="hidden">
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-700 font-medium text-center" id="error-text">生成失败，请重试</p>
            </div>
            <button id="retry-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                重新生成
            </button>
        </div>
    </div>

    <script>
        async function generateLesson() {
            const file = document.getElementById('ppt-file').files[0];
            if (!file) {
                alert('请先选择PPT文件');
                return;
            }

            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('progress-section').classList.remove('hidden');
            updateProgress(10, '正在上传PPT...');

            try {
                const response = await fetch('/api/generate-video', {
                    method: 'POST',
                    body: file
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                updateProgress(90, '正在下载视频...');
                const blob = await response.blob();
                const videoUrl = URL.createObjectURL(blob);
                
                updateProgress(100, '生成完成！');
                document.getElementById('download-btn').href = videoUrl;
                document.getElementById('progress-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('progress-section').classList.add('hidden');
                document.getElementById('error-text').textContent = error.message;
                document.getElementById('error-section').classList.remove('hidden');
            }
        }

        function updateProgress(percent, status) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = `${percent}%`;
            document.getElementById('status-text').textContent = status;
        }

        function reset() {
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('progress-section').classList.add('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('error-section').classList.add('hidden');
            document.getElementById('ppt-file').value = '';
        }

        document.getElementById('upload-btn').addEventListener('click', generateLesson);
        document.getElementById('reset-btn').addEventListener('click', reset);
        document.getElementById('retry-btn').addEventListener('click', reset);
    </script>
</body>
</html>
