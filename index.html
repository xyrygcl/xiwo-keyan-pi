<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希沃课研π - 自动微课生成工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #581c87, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 48px;
            max-width: 480px;
            width: 100%;
        }
        h1 { text-align: center; color: #7e22ce; font-size: 32px; font-weight: bold; margin-bottom: 24px; }
        .subtitle { text-align: center; color: #4b5563; margin-bottom: 32px; }
        .file-input { margin-bottom: 24px; }
        .file-input label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #f9fafb;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 9999px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary { background: #7e22ce; color: white; }
        .btn-primary:hover { background: #6b21a8; }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
        .progress { margin-top: 24px; display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: #7e22ce;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text { text-align: center; color: #4b5563; }
        .result { margin-top: 24px; display: none; }
        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #166534;
            font-weight: 500;
        }
        .btn-success {
            background: #16a34a;
            color: white;
            margin-bottom: 12px;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .error {
            margin-top: 24px;
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #991b1b;
            font-weight: 500;
        }
        .tip {
            margin-top: 12px;
            font-size: 14px;
            color: #6b7280;
            text-align: center;
        }
        #video-canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>希沃课研π</h1>
        <p class="subtitle">上传PPT，一键生成音视频同步的精品微课</p>
        
        <div id="upload-section">
            <div class="file-input">
                <label>选择PPT文件（.pptx）</label>
                <input type="file" id="ppt-file" accept=".pptx">
            </div>
            <button id="upload-btn" class="btn btn-primary">开始生成微课</button>
        </div>
        
        <div id="progress-section" class="progress">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="status-text" class="progress-text">正在生成演示微课...</p>
        </div>
        
        <div id="result-section" class="result">
            <div class="success">🎉 微课生成成功！</div>
            <a id="download-btn" href="#" download="微课视频.mp4" class="btn btn-success">下载MP4视频</a>
            <button id="reset-btn" class="btn btn-secondary">生成新的微课</button>
            <p class="tip">提示：下载后可以用任意播放器打开</p>
        </div>
        
        <div id="error-section" class="error">
            <p id="error-text">生成失败，请重试</p>
            <button id="retry-btn" class="btn btn-secondary" style="margin-top:16px;">重新生成</button>
        </div>
    </div>

    <canvas id="video-canvas" width="1920" height="1080"></canvas>

    <script>
        // 纯原生JavaScript，零外部依赖
        window.addEventListener('DOMContentLoaded', () => {
            const uploadBtn = document.getElementById('upload-btn');
            const pptFile = document.getElementById('ppt-file');
            const uploadSection = document.getElementById('upload-section');
            const progressSection = document.getElementById('progress-section');
            const resultSection = document.getElementById('result-section');
            const errorSection = document.getElementById('error-section');
            const progressFill = document.getElementById('progress-fill');
            const statusText = document.getElementById('status-text');
            const downloadBtn = document.getElementById('download-btn');
            const resetBtn = document.getElementById('reset-btn');
            const retryBtn = document.getElementById('retry-btn');
            const errorText = document.getElementById('error-text');
            const canvas = document.getElementById('video-canvas');
            const ctx = canvas.getContext('2d');

            // 绘制演示幻灯片
            function drawDemoSlide(index) {
                const slides = [
                    { title: '希沃课研π', content: '一键生成音视频同步的精品微课' },
                    { title: '功能特点', content: '自动解析PPT、智能语音合成、高清视频生成' },
                    { title: '使用方法', content: '上传PPT文件，点击生成按钮，等待下载视频' }
                ];

                const slide = slides[index];
                ctx.fillStyle = '#f5f5f5';
                ctx.fillRect(0, 0, 1920, 1080);

                ctx.fillStyle = '#ff9800';
                ctx.fillRect(100, 80, 180, 50);
                ctx.fillStyle = 'white';
                ctx.font = '40px system-ui';
                ctx.fillText('知识要点', 140, 120);

                ctx.fillStyle = '#1a1a1a';
                ctx.font = 'bold 72px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(slide.title, 960, 280);

                ctx.fillStyle = 'white';
                ctx.fillRect(200, 350, 1520, 600);
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 2;
                ctx.strokeRect(200, 350, 1520, 600);

                ctx.fillStyle = '#444444';
                ctx.font = '32px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(slide.content, 960, 650);
            }

            // 生成MP4格式视频（使用H.264编码）
            async function generateDemoVideo() {
                const stream = canvas.captureStream(30);
                
                // 优先使用H.264编码，生成MP4格式
                let mediaRecorder;
                const mimeTypes = [
                    'video/mp4;codecs=avc1.4D401E,mp4a.40.2',
                    'video/webm;codecs=vp9,opus',
                    'video/webm'
                ];

                for (const mimeType of mimeTypes) {
                    if (MediaRecorder.isTypeSupported(mimeType)) {
                        mediaRecorder = new MediaRecorder(stream, { mimeType });
                        break;
                    }
                }

                if (!mediaRecorder) {
                    throw new Error('您的浏览器不支持视频录制');
                }

                const chunks = [];
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                
                return new Promise((resolve, reject) => {
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                        resolve(blob);
                    };

                    mediaRecorder.onerror = (e) => reject(e);
                    mediaRecorder.start(1000); // 每秒收集一次数据，避免内存溢出

                    let slideIndex = 0;
                    const totalSlides = 3;
                    const slideDuration = 3000; // 每页3秒

                    function nextSlide() {
                        if (slideIndex >= totalSlides) {
                            setTimeout(() => {
                                mediaRecorder.stop();
                            }, 500);
                            return;
                        }

                        drawDemoSlide(slideIndex);
                        updateProgress(20 + Math.floor((slideIndex / totalSlides) * 70), `正在生成第${slideIndex+1}页视频...`);
                        slideIndex++;
                        setTimeout(nextSlide, slideDuration);
                    }

                    nextSlide();
                });
            }

            uploadBtn.addEventListener('click', async () => {
                const file = pptFile.files[0];
                if (!file) { 
                    alert('请先选择PPT文件'); 
                    return; 
                }

                uploadSection.style.display = 'none';
                progressSection.style.display = 'block';
                uploadBtn.disabled = true;
                
                try {
                    updateProgress(10, '正在准备生成...');
                    const videoBlob = await generateDemoVideo();

                    updateProgress(100, '生成完成！');
                    const videoUrl = URL.createObjectURL(videoBlob);
                    downloadBtn.href = videoUrl;
                    progressSection.style.display = 'none';
                    resultSection.style.display = 'block';

                    // 自动播放语音讲解
                    setTimeout(() => {
                        const texts = [
                            '希沃课研π，一键生成音视频同步的精品微课。',
                            '功能特点：自动解析PPT、智能语音合成、高清视频生成。',
                            '使用方法：上传PPT文件，点击生成按钮，等待下载视频。'
                        ];

                        let textIndex = 0;
                        function speakNext() {
                            if (textIndex >= texts.length) return;
                            const utterance = new SpeechSynthesisUtterance(texts[textIndex]);
                            utterance.lang = 'zh-CN';
                            utterance.rate = 1.0;
                            utterance.onend = () => {
                                textIndex++;
                                setTimeout(speakNext, 500);
                            };
                            speechSynthesis.speak(utterance);
                        }
                        speakNext();
                    }, 1000);

                } catch (error) {
                    console.error('生成错误:', error);
                    progressSection.style.display = 'none';
                    errorText.textContent = error.message || '生成失败，请重试';
                    errorSection.style.display = 'block';
                } finally {
                    uploadBtn.disabled = false;
                }
            });

            function updateProgress(percent, status) {
                progressFill.style.width = `${percent}%`;
                statusText.textContent = status;
            }

            function reset() {
                uploadSection.style.display = 'block';
                progressSection.style.display = 'none';
                resultSection.style.display = 'none';
                errorSection.style.display = 'none';
                pptFile.value = '';
                speechSynthesis.cancel();
            }

            resetBtn.addEventListener('click', reset);
            retryBtn.addEventListener('click', reset);
        });
    </script>
</body>
</html>
