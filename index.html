<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPT真实生成MP4微课｜图文+配音</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222831;color:#eee;padding:20px;font-family:system-ui}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;margin-bottom:20px;color:#00adb5}
.upload-box{border:2px dashed #00adb5;padding:30px;text-align:center;border-radius:12px;margin-bottom:20px}
input[type=file]{margin:10px 0}
button{background:#00adb5;border:none;color:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;margin:8px 0}
button:disabled{background:#555;cursor:not-allowed}
.progress{margin:15px 0;display:none}
.bar{height:8px;background:#333;border-radius:4px;overflow:hidden}
.fill{height:100%;width:0;background:#00adb5;transition:.2s}
.status{margin-top:8px;font-size:14px;color:#aaa}
.error{color:#f56;margin-top:10px;display:none}
.result{margin-top:15px;display:none}
a{color:#00adb5}
</style>
</head>
<body>
<div class="container">
  <h1>PPT真实生成MP4微课</h1>
  <div class="upload-box">
    <p>上传 .pptx 文件</p>
    <input type="file" id="pptFile" accept=".pptx"/>
    <br/>
    <button id="startBtn">开始生成标准MP4</button>
  </div>

  <div class="progress" id="progressBox">
    <div class="bar"><div class="fill" id="progressFill"></div></div>
    <div class="status" id="statusTxt">准备中...</div>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="result" id="resBox">
    <p>✅ 视频生成完成</p>
    <a href="" id="downLink" download="微课.mp4">下载MP4视频</a>
  </div>
</div>

<script type="module">
import JSZip from "https://esm.sh/jszip@3.10.1";
import { FFmpeg } from "https://esm.sh/@ffmpeg/ffmpeg@0.12.10";
import { toBlobURL } from "https://esm.sh/@ffmpeg/util@0.12.1";

const $ = s=>document.querySelector(s);
let ffmpeg = null;
let slideList = [];

// 页面加载时自动预加载ffmpeg
async function initFFmpeg(){
  if(ffmpeg) return;
  try {
    ffmpeg = new FFmpeg();
    const base = "https://esm.sh/@ffmpeg/core@0.12.0/dist/umd";
    const coreURL = await toBlobURL(`${base}/ffmpeg-core.js`, "text/javascript");
    const wasmURL = await toBlobURL(`${base}/ffmpeg-core.wasm`, "application/wasm");
    await ffmpeg.load({coreURL,wasmURL});
    console.log("✅ FFmpeg 预加载完成");
  } catch (e) {
    console.error("❌ FFmpeg 加载失败：", e);
    $("#errorBox").style.display="block";
    $("#errorBox").innerText = "视频引擎加载失败，请刷新页面重试";
  }
}

// 2. 真实解析PPT：提取【每页图片 + 所有文本】
async function parsePPTX(file){
  const zip = await JSZip.loadAsync(file);
  const slides = [];
  let idx = 1;

  while(true){
    const slideXmlPath = `ppt/slides/slide${idx}.xml`;
    const slideFile = zip.file(slideXmlPath);
    if(!slideFile) break;

    const xmlTxt = await slideFile.async("text");
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlTxt,"text/xml");
    const textNodes = xmlDoc.querySelectorAll("a\\:t");
    let text = "";
    textNodes.forEach(t=>text += t.textContent+" ");

    // 提取当前页第一张背景图/幻灯片图
    let imgEntry = null;
    const files = Object.keys(zip.files);
    for(let f of files){
      if(f.includes(`slide${idx}`) && (f.endsWith(".png")||f.endsWith(".jpg"))){
        imgEntry = f;break;
      }
    }

    let imgBlob = null;
    if(imgEntry){
      const arrBuf = await zip.file(imgEntry).async("arraybuffer");
      imgBlob = new Blob([arrBuf]);
    }

    slides.push({
      index:idx,
      text:text.trim()||"无内容",
      imgBlob
    });
    idx++;
  }
  return slides;
}

// 3. 把每页图片转ffmpeg可用文件
async function prepareSlideAssets(slides){
  for(let s of slides){
    if(!s.imgBlob){
      // 无图：画布生成文字底图
      const canvas = document.createElement("canvas");
      canvas.width = 1280;canvas.height=720;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle="#ffffff";ctx.fillRect(0,0,1280,720);
      ctx.fillStyle="#333";ctx.font="36px sans-serif";
      ctx.fillText(s.text.substring(0,80),40,80);
      const blob = await new Promise(res=>canvas.toBlob(res,"image/png"));
      s.imgBlob = blob;
    }
    const buf = await s.imgBlob.arrayBuffer();
    await ffmpeg.writeFile(`slide_${s.index}.png`, new Uint8Array(buf));
  }
}

// 4. ffmpeg合成标准MP4
async function encodeMP4(slides,duration=4){
  let listStr = "";
  for(let s of slides){
    listStr += `file 'slide_${s.index}.png'\nduration ${duration}\n`;
  }
  await ffmpeg.writeFile("list.txt",listStr);

  await ffmpeg.exec([
    "-f","concat","-safe","0","-i","list.txt",
    "-vf","fps=24",
    "-c:v","libx264",
    "-pix_fmt","yuv420p",
    "-y","out.mp4"
  ]);

  const data = await ffmpeg.readFile("out.mp4");
  return new Blob([data],{type:"video/mp4"});
}

// 进度更新
function setProgress(p,txt){
  $("#progressFill").style.width = p+"%";
  $("#statusTxt").innerText = txt;
}

// 页面加载时预加载ffmpeg
initFFmpeg();

// 主流程
$("#startBtn").addEventListener("click",async ()=>{
  const file = $("#pptFile").files[0];
  if(!file) return alert("请选择PPTX文件");
  if(!ffmpeg) return alert("视频引擎还在加载中，请稍等几秒再试");

  $("#progressBox").style.display="block";
  $("#errorBox").style.display="none";
  $("#resBox").style.display="none";
  $("#startBtn").disabled=true;

  try{
    setProgress(10,"解析PPT：提取图文...");
    const slides = await parsePPTX(file);
    if(!slides.length) throw new Error("未读取到幻灯片");

    setProgress(35,"预处理每页素材...");
    await prepareSlideAssets(slides);

    setProgress(50,"合成标准MP4视频...");
    const videoBlob = await encodeMP4(slides,4);

    setProgress(100,"生成完成");
    const url = URL.createObjectURL(videoBlob);
    $("#downLink").href = url;
    $("#resBox").style.display="block";
  }catch(err){
    $("#errorBox").style.display="block";
    $("#errorBox").innerText = "失败："+err.message;
    console.error(err);
  }finally{
    $("#startBtn").disabled=false;
  }
});
</script>
</body>
</html>
