<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希沃课研π - 自动微课生成工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #581c87, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 48px;
            max-width: 480px;
            width: 100%;
        }
        h1 { text-align: center; color: #7e22ce; font-size: 32px; font-weight: bold; margin-bottom: 24px; }
        .subtitle { text-align: center; color: #4b5563; margin-bottom: 32px; }
        .file-input { margin-bottom: 24px; }
        .file-input label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #f9fafb;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 9999px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary { background: #7e22ce; color: white; }
        .btn-primary:hover { background: #6b21a8; }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
        .progress { margin-top: 24px; display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: #7e22ce;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text { text-align: center; color: #4b5563; }
        .result { margin-top: 24px; display: none; }
        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #166534;
            font-weight: 500;
        }
        .btn-success {
            background: #16a34a;
            color: white;
            margin-bottom: 12px;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .error {
            margin-top: 24px;
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #991b1b;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>希沃课研π</h1>
        <p class="subtitle">上传PPT，一键生成音视频同步的精品微课</p>
        
        <div id="upload-section">
            <div class="file-input">
                <label>选择PPT文件（.pptx）</label>
                <input type="file" id="ppt-file" accept=".pptx">
            </div>
            <button id="upload-btn" class="btn btn-primary">开始生成微课</button>
        </div>
        
        <div id="progress-section" class="progress">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="status-text" class="progress-text">正在解析PPT...</p>
        </div>
        
        <div id="result-section" class="result">
            <div class="success">🎉 微课生成成功！</div>
            <a id="download-btn" href="#" download="微课视频.mp4" class="btn btn-success">下载视频</a>
            <button id="reset-btn" class="btn btn-secondary">生成新的微课</button>
        </div>
        
        <div id="error-section" class="error">
            <p id="error-text">生成失败，请重试</p>
            <button id="retry-btn" class="btn btn-secondary" style="margin-top:16px;">重新生成</button>
        </div>
    </div>

    <script type="module">
        // 使用ES模块导入FFmpeg，这是唯一不会被浏览器拦截的方式
        import { FFmpeg } from 'https://esm.sh/@ffmpeg/ffmpeg@0.12.10';
        import { fetchFile, toBlobURL } from 'https://esm.sh/@ffmpeg/util@0.12.1';

        const uploadBtn = document.getElementById('upload-btn');
        const pptFile = document.getElementById('ppt-file');
        const uploadSection = document.getElementById('upload-section');
        const progressSection = document.getElementById('progress-section');
        const resultSection = document.getElementById('result-section');
        const errorSection = document.getElementById('error-section');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorText = document.getElementById('error-text');

        let ffmpeg;

        async function initFFmpeg() {
            if (ffmpeg) return;
            ffmpeg = new FFmpeg();
            await ffmpeg.load({
                coreURL: await toBlobURL('https://esm.sh/@ffmpeg/core@0.12.0/dist/umd/ffmpeg-core.js', 'text/javascript'),
                wasmURL: await toBlobURL('https://esm.sh/@ffmpeg/core@0.12.0/dist/umd/ffmpeg-core.wasm', 'application/wasm'),
            });
        }

        // 浏览器原生TTS生成音频Blob
        async function generateAudio(text) {
            return new Promise((resolve, reject) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;

                const audioContext = new AudioContext();
                const destination = audioContext.createMediaStreamDestination();
                const mediaRecorder = new MediaRecorder(destination.stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    resolve(blob);
                };

                utterance.onstart = () => {
                    const source = audioContext.createMediaStreamSource(
                        audioContext.createMediaStreamDestination().stream
                    );
                    source.connect(destination);
                    mediaRecorder.start();
                };

                utterance.onend = () => {
                    mediaRecorder.stop();
                };

                utterance.onerror = (e) => reject(e);
                speechSynthesis.speak(utterance);
            });
        }

        async function generateSlideVideo(slide, index) {
            const text = slide.title + '。' + [...slide.bullets, ...slide.paragraphs].join('。');
            const audioBlob = await generateAudio(text);
            const audioName = `audio_${index}.webm`;
            await ffmpeg.writeFile(audioName, new Uint8Array(await audioBlob.arrayBuffer()));

            const { stdout } = await ffmpeg.exec([
                '-i', audioName, '-v', 'error', '-show_entries', 'format=duration',
                '-of', 'default=noprint_wrappers=1:nokey=1'
            ]);
            const duration = parseFloat(stdout) + 0.5;

            const outputName = `slide_${index}.mp4`;
            await ffmpeg.exec([
                '-f', 'lavfi', `-i`, `color=c=#f5f5f5:s=1920x1080:d=${duration}`,
                '-i', audioName,
                '-vf', `drawtext=text='${slide.title.replace(/'/g, "'\\''")}':fontsize=72:fontcolor=#1a1a1a:x=(w-text_w)/2:y=200,
                        drawtext=text='${[...slide.bullets, ...slide.paragraphs].join(' ').substring(0, 200).replace(/'/g, "'\\''")}':fontsize=32:fontcolor=#444444:x=200:y=400`,
                '-c:v', 'libx264', '-pix_fmt', 'yuv420p',
                '-c:a', 'aac', '-b:a', '192k',
                '-shortest', outputName
            ]);

            return outputName;
        }

        uploadBtn.addEventListener('click', async () => {
            const file = pptFile.files[0];
            if (!file) { alert('请先选择PPT文件'); return; }

            uploadSection.style.display = 'none';
            progressSection.style.display = 'block';
            
            try {
                updateProgress(10, '正在解析PPT...');
                const parseRes = await fetch('/api/parse-ppt', {
                    method: 'POST',
                    body: file
                });

                if (!parseRes.ok) {
                    const err = await parseRes.json();
                    throw new Error(err.error);
                }

                const { slides } = await parseRes.json();
                updateProgress(20, `解析完成，共${slides.length}页`);

                updateProgress(30, '正在加载FFmpeg...');
                await initFFmpeg();

                const slideFiles = [];
                for (let i = 0; i < slides.length; i++) {
                    updateProgress(30 + Math.floor((i / slides.length) * 60), `正在生成第${i+1}页视频...`);
                    const name = await generateSlideVideo(slides[i], i);
                    slideFiles.push(name);
                }

                updateProgress(90, '正在合并视频...');
                const concatContent = slideFiles.map(f => `file '${f}'`).join('\n');
                await ffmpeg.writeFile('concat.txt', concatContent);
                
                await ffmpeg.exec([
                    '-f', 'concat', '-safe', '0', '-i', 'concat.txt',
                    '-c', 'copy', 'output.mp4'
                ]);

                const data = await ffmpeg.readFile('output.mp4');
                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const videoUrl = URL.createObjectURL(videoBlob);

                updateProgress(100, '生成完成！');
                downloadBtn.href = videoUrl;
                progressSection.style.display = 'none';
                resultSection.style.display = 'block';

            } catch (error) {
                console.error(error);
                progressSection.style.display = 'none';
                errorText.textContent = error.message;
                errorSection.style.display = 'block';
            }
        });

        function updateProgress(percent, status) {
            progressFill.style.width = `${percent}%`;
            statusText.textContent = status;
        }

        function reset() {
            uploadSection.style.display = 'block';
            progressSection.style.display = 'none';
            resultSection.style.display = 'none';
            errorSection.style.display = 'none';
            pptFile.value = '';
        }

        resetBtn.addEventListener('click', reset);
        retryBtn.addEventListener('click', reset);
    </script>
</body>
</html>
