<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPT微课生成器｜带图文字幕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222831;color:#eee;padding:20px;font-family:system-ui}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;margin-bottom:20px;color:#00adb5}
.upload-box{border:2px dashed #00adb5;padding:30px;text-align:center;border-radius:12px;margin-bottom:20px}
input[type=file]{margin:10px 0}
button{background:#00adb5;border:none;color:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;margin:8px 0}
button:disabled{background:#555;cursor:not-allowed}
.progress{margin:15px 0;display:none}
.bar{height:8px;background:#333;border-radius:4px;overflow:hidden}
.fill{height:100%;width:0;background:#00adb5;transition:.2s}
.status{margin-top:8px;font-size:14px;color:#aaa}
.error{color:#f56;margin-top:10px;display:none}
.result{margin-top:15px;display:none}
a{color:#00adb5}
#canvas{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>PPT微课生成器｜带图文字幕</h1>
  <div class="upload-box">
    <p>上传 .pptx 文件</p>
    <input type="file" id="pptFile" accept=".pptx"/>
    <br/>
    <button id="startBtn">开始生成视频</button>
  </div>

  <div class="progress" id="progressBox">
    <div class="bar"><div class="fill" id="progressFill"></div></div>
    <div class="status" id="statusTxt">准备中...</div>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="result" id="resBox">
    <p>✅ 视频生成完成</p>
    <a href="" id="downLink" download="微课视频.webm">下载视频</a>
  </div>
</div>

<!-- 隐藏画布，用于绘制视频帧 -->
<canvas id="canvas" width="1280" height="720"></canvas>

<script type="module">
import JSZip from "https://esm.sh/jszip@3.10.1";

const $ = s=>document.querySelector(s);
const canvas = $("#canvas");
const ctx = canvas.getContext("2d");

// 1. 解析PPT，提取每页的文字和图片
async function parsePPTX(file){
  const zip = await JSZip.loadAsync(file);
  const slides = [];
  let slideIndex = 1;

  while(true){
    const slideXmlPath = `ppt/slides/slide${slideIndex}.xml`;
    const slideFile = zip.file(slideXmlPath);
    if(!slideFile) break;

    // 解析XML中的所有文本
    const xmlTxt = await slideFile.async("text");
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlTxt, "text/xml");
    const textNodes = xmlDoc.getElementsByTagName("a:t");
    let fullText = "";
    for(let t of textNodes) {
      fullText += t.textContent.trim() + " ";
    }

    // 提取幻灯片中的图片
    let img = null;
    // 查找当前幻灯片的图片（如 slide1.xml.rels 引用的图片）
    const imgPattern = new RegExp(`ppt/media/image.*\\.(png|jpg|jpeg)`);
    const allFiles = Object.keys(zip.files);
    for(let f of allFiles){
      if(f.match(imgPattern)){
        const arrBuf = await zip.file(f).async("arraybuffer");
        const blob = new Blob([arrBuf]);
        const url = URL.createObjectURL(blob);
        img = await new Promise((resolve) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.src = url;
        });
        break;
      }
    }

    slides.push({
      index: slideIndex,
      text: fullText.trim() || `第${slideIndex}页（无文字内容）`,
      img
    });
    slideIndex++;
  }
  return slides;
}

// 2. 把单页PPT完整绘制到Canvas（含图片+文字+字幕背景）
function drawSlideToCanvas(slide){
  // 1. 先画背景
  ctx.fillStyle = "#f5f5f5";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 2. 有图片就画图片，占满画布
  if(slide.img){
    ctx.drawImage(slide.img, 0, 0, canvas.width, canvas.height);
  }

  // 3. 画字幕背景条（半透明黑底，提升文字可读性）
  const textBgY = canvas.height - 120;
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, textBgY, canvas.width, 120);

  // 4. 画文字（标题+内容，分行显示）
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 自动分行，避免超出宽度
  const maxWidth = canvas.width - 100;
  const fontSize = 36;
  ctx.font = `bold ${fontSize}px system-ui, sans-serif`;
  const words = slide.text.split("");
  let line = "";
  let lines = [];

  for(let i=0; i<words.length; i++){
    const testLine = line + words[i];
    if(ctx.measureText(testLine).width > maxWidth && line){
      lines.push(line);
      line = words[i];
    } else {
      line = testLine;
    }
  }
  if(line) lines.push(line);

  // 只显示最多3行文字，避免超出字幕区域
  lines = lines.slice(0,3);
  const lineHeight = fontSize + 10;
  const startY = textBgY + 60 - (lines.length-1)*lineHeight/2;

  lines.forEach((l, i) => {
    ctx.fillText(l, canvas.width/2, startY + i*lineHeight);
  });
}

// 3. 录制视频（带真实PPT内容）
async function recordVideo(slides, pageDuration=3000){
  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm; codecs=vp9"
  });

  const chunks = [];
  recorder.ondataavailable = (e) => chunks.push(e.data);

  return new Promise((resolve) => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      resolve(blob);
    };

    recorder.start();

    let currentIndex = 0;
    function drawNextPage(){
      if(currentIndex >= slides.length){
        recorder.stop();
        return;
      }

      drawSlideToCanvas(slides[currentIndex]);
      currentIndex++;
      setTimeout(drawNextPage, pageDuration);
    }

    drawNextPage();
  });
}

// 进度条更新
function setProgress(percent, text){
  $("#progressFill").style.width = `${percent}%`;
  $("#statusTxt").innerText = text;
}

// 主流程
$("#startBtn").addEventListener("click", async () => {
  const file = $("#pptFile").files[0];
  if(!file) return alert("请先选择PPT文件");

  $("#progressBox").style.display = "block";
  $("#errorBox").style.display = "none";
  $("#resBox").style.display = "none";
  $("#startBtn").disabled = true;

  try{
    setProgress(10, "正在解析PPT，提取图文...");
    const slides = await parsePPTX(file);
    if(slides.length === 0) throw new Error("未解析到任何幻灯片");

    setProgress(50, `解析完成，共${slides.length}页，正在生成视频...`);
    const videoBlob = await recordVideo(slides, 3000);

    setProgress(100, "生成完成！");
    const url = URL.createObjectURL(videoBlob);
    $("#downLink").href = url;
    $("#resBox").style.display = "block";
  } catch(err){
    $("#errorBox").style.display = "block";
    $("#errorBox").innerText = `生成失败：${err.message}`;
    console.error(err);
  } finally {
    $("#startBtn").disabled = false;
  }
});
</script>
</body>
</html>
