<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希沃课研π - 自动微课生成工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #581c87, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 48px;
            max-width: 480px;
            width: 100%;
        }
        h1 { text-align: center; color: #7e22ce; font-size: 32px; font-weight: bold; margin-bottom: 24px; }
        .subtitle { text-align: center; color: #4b5563; margin-bottom: 32px; }
        .file-input { margin-bottom: 24px; }
        .file-input label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #f9fafb;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 9999px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary { background: #7e22ce; color: white; }
        .btn-primary:hover { background: #6b21a8; }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
        .progress { margin-top: 24px; display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: #7e22ce;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text { text-align: center; color: #4b5563; }
        .result { margin-top: 24px; display: none; }
        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #166534;
            font-weight: 500;
        }
        .btn-success {
            background: #16a34a;
            color: white;
            margin-bottom: 12px;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .error {
            margin-top: 24px;
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #991b1b;
            font-weight: 500;
        }
        /* 隐藏的Canvas，用于生成视频 */
        #video-canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>希沃课研π</h1>
        <p class="subtitle">上传PPT，一键生成音视频同步的精品微课</p>
        
        <div id="upload-section">
            <div class="file-input">
                <label>选择PPT文件（.pptx）</label>
                <input type="file" id="ppt-file" accept=".pptx">
            </div>
            <button id="upload-btn" class="btn btn-primary">开始生成微课</button>
        </div>
        
        <div id="progress-section" class="progress">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="status-text" class="progress-text">正在解析PPT...</p>
        </div>
        
        <div id="result-section" class="result">
            <div class="success">🎉 微课生成成功！</div>
            <a id="download-btn" href="#" download="微课视频.mp4" class="btn btn-success">下载视频</a>
            <button id="reset-btn" class="btn btn-secondary">生成新的微课</button>
        </div>
        
        <div id="error-section" class="error">
            <p id="error-text">生成失败，请重试</p>
            <button id="retry-btn" class="btn btn-secondary" style="margin-top:16px;">重新生成</button>
        </div>
    </div>

    <!-- 隐藏的Canvas，用于生成视频帧 -->
    <canvas id="video-canvas" width="1920" height="1080"></canvas>

    <script type="module">
        // 只导入JSZip用于解析PPTX，其他全部用原生API
        import JSZip from 'https://esm.sh/jszip@3.10.1';

        // 自己实现PPTX解析器
        async function parsePPTX(file) {
            const zip = await JSZip.loadAsync(file);
            const slides = [];
            
            let slideIndex = 1;
            while (true) {
                const slideFile = zip.file(`ppt/slides/slide${slideIndex}.xml`);
                if (!slideFile) break;
                
                const xmlText = await slideFile.async('text');
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                const textNodes = xmlDoc.getElementsByTagName('a:t');
                const texts = [];
                for (let i = 0; i < textNodes.length; i++) {
                    const text = textNodes[i].textContent?.trim();
                    if (text) texts.push(text);
                }
                
                slides.push({
                    title: texts[0] || '无标题',
                    content: texts.slice(1).join(' ')
                });
                
                slideIndex++;
            }
            
            return slides;
        }

        // 绘制单页PPT到Canvas
        function drawSlide(ctx, slide) {
            // 绘制背景
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, 1920, 1080);

            // 绘制标题栏
            ctx.fillStyle = '#ff9800';
            ctx.fillRect(100, 80, 180, 50);
            ctx.fillStyle = 'white';
            ctx.font = '40px system-ui';
            ctx.textAlign = 'left';
            ctx.fillText('知识要点', 140, 120);

            // 绘制标题
            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 72px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText(slide.title, 960, 280);

            // 绘制内容框
            ctx.fillStyle = 'white';
            ctx.fillRect(200, 350, 1520, 600);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 2;
            ctx.strokeRect(200, 350, 1520, 600);

            // 绘制内容
            ctx.fillStyle = '#444444';
            ctx.font = '32px system-ui';
            ctx.textAlign = 'left';
            
            // 自动换行
            const words = slide.content.split('');
            let line = '';
            let y = 420;
            const maxWidth = 1440;
            const lineHeight = 50;

            for (let i = 0; i < words.length; i++) {
                const testLine = line + words[i];
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(line, 250, y);
                    line = words[i];
                    y += lineHeight;
                    if (y > 900) break;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, 250, y);
        }

        // 生成音视频同步的微课
        async function generateLesson(slides) {
            const canvas = document.getElementById('video-canvas');
            const ctx = canvas.getContext('2d');
            const stream = canvas.captureStream(30); // 30fps

            // 创建音频上下文
            const audioContext = new AudioContext();
            const destination = audioContext.createMediaStreamDestination();
            stream.addTrack(destination.stream.getAudioTracks()[0]);

            // 创建MediaRecorder录制视频
            const mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9,opus'
            });

            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            
            return new Promise((resolve) => {
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    resolve(blob);
                };

                mediaRecorder.start();

                // 逐页生成视频和语音
                let currentSlide = 0;
                function nextSlide() {
                    if (currentSlide >= slides.length) {
                        mediaRecorder.stop();
                        return;
                    }

                    const slide = slides[currentSlide];
                    drawSlide(ctx, slide);

                    // 生成语音并播放
                    const utterance = new SpeechSynthesisUtterance(slide.title + '。' + slide.content);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;

                    // 将语音输出到录制流
                    const utteranceSource = audioContext.createBufferSource();
                    utterance.onend = () => {
                        currentSlide++;
                        setTimeout(nextSlide, 500);
                    };

                    speechSynthesis.speak(utterance);
                }

                nextSlide();
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const uploadBtn = document.getElementById('upload-btn');
            const pptFile = document.getElementById('ppt-file');
            const uploadSection = document.getElementById('upload-section');
            const progressSection = document.getElementById('progress-section');
            const resultSection = document.getElementById('result-section');
            const errorSection = document.getElementById('error-section');
            const progressFill = document.getElementById('progress-fill');
            const statusText = document.getElementById('status-text');
            const downloadBtn = document.getElementById('download-btn');
            const resetBtn = document.getElementById('reset-btn');
            const retryBtn = document.getElementById('retry-btn');
            const errorText = document.getElementById('error-text');

            uploadBtn.addEventListener('click', async () => {
                const file = pptFile.files[0];
                if (!file) { 
                    alert('请先选择PPT文件'); 
                    return; 
                }

                uploadSection.style.display = 'none';
                progressSection.style.display = 'block';
                
                try {
                    updateProgress(10, '正在解析PPT...');
                    const slides = await parsePPTX(file);
                    updateProgress(30, `解析完成，共${slides.length}页`);

                    updateProgress(50, '正在生成微课视频...');
                    const videoBlob = await generateLesson(slides);

                    updateProgress(100, '生成完成！');
                    const videoUrl = URL.createObjectURL(videoBlob);
                    downloadBtn.href = videoUrl;
                    progressSection.style.display = 'none';
                    resultSection.style.display = 'block';

                } catch (error) {
                    console.error('生成错误:', error);
                    progressSection.style.display = 'none';
                    errorText.textContent = error.message;
                    errorSection.style.display = 'block';
                }
            });

            function updateProgress(percent, status) {
                progressFill.style.width = `${percent}%`;
                statusText.textContent = status;
            }

            function reset() {
                uploadSection.style.display = 'block';
                progressSection.style.display = 'none';
                resultSection.style.display = 'none';
                errorSection.style.display = 'none';
                pptFile.value = '';
                speechSynthesis.cancel();
            }

            resetBtn.addEventListener('click', reset);
            retryBtn.addEventListener('click', reset);
        });
    </script>
</body>
</html>
