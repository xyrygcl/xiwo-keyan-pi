<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PPT真实生成MP4微课｜无FFmpeg依赖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222831;color:#eee;padding:20px;font-family:system-ui}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;margin-bottom:20px;color:#00adb5}
.upload-box{border:2px dashed #00adb5;padding:30px;text-align:center;border-radius:12px;margin-bottom:20px}
input[type=file]{margin:10px 0}
button{background:#00adb5;border:none;color:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;margin:8px 0}
button:disabled{background:#555;cursor:not-allowed}
.progress{margin:15px 0;display:none}
.bar{height:8px;background:#333;border-radius:4px;overflow:hidden}
.fill{height:100%;width:0;background:#00adb5;transition:.2s}
.status{margin-top:8px;font-size:14px;color:#aaa}
.error{color:#f56;margin-top:10px;display:none}
.result{margin-top:15px;display:none}
a{color:#00adb5}
#canvas{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>PPT真实生成MP4微课</h1>
  <div class="upload-box">
    <p>上传 .pptx 文件</p>
    <input type="file" id="pptFile" accept=".pptx"/>
    <br/>
    <button id="startBtn">开始生成标准视频</button>
  </div>

  <div class="progress" id="progressBox">
    <div class="bar"><div class="fill" id="progressFill"></div></div>
    <div class="status" id="statusTxt">准备中...</div>
  </div>

  <div class="error" id="errorBox"></div>
  <div class="result" id="resBox">
    <p>✅ 视频生成完成</p>
    <a href="" id="downLink" download="微课.webm">下载视频</a>
  </div>
</div>

<canvas id="canvas" width="1280" height="720"></canvas>

<script type="module">
import JSZip from "https://esm.sh/jszip@3.10.1";

const $ = s=>document.querySelector(s);
const canvas = $("#canvas");
const ctx = canvas.getContext("2d");

// 1. 真实解析PPT：提取【每页图片 + 所有文本】
async function parsePPTX(file){
  const zip = await JSZip.loadAsync(file);
  const slides = [];
  let idx = 1;

  while(true){
    const slideXmlPath = `ppt/slides/slide${idx}.xml`;
    const slideFile = zip.file(slideXmlPath);
    if(!slideFile) break;

    const xmlTxt = await slideFile.async("text");
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlTxt,"text/xml");
    const textNodes = xmlDoc.querySelectorAll("a\\:t");
    let text = "";
    textNodes.forEach(t=>text += t.textContent+" ");

    // 提取当前页第一张背景图/幻灯片图
    let imgEntry = null;
    const files = Object.keys(zip.files);
    for(let f of files){
      if(f.includes(`slide${idx}`) && (f.endsWith(".png")||f.endsWith(".jpg"))){
        imgEntry = f;break;
      }
    }

    let img = null;
    if(imgEntry){
      const arrBuf = await zip.file(imgEntry).async("arraybuffer");
      const blob = new Blob([arrBuf]);
      const url = URL.createObjectURL(blob);
      img = await new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = url;
      });
    }

    slides.push({
      index:idx,
      text:text.trim()||"无内容",
      img
    });
    idx++;
  }
  return slides;
}

// 2. 绘制单页到Canvas
function drawSlide(slide){
  // 清空画布
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 绘制图片（如果有）
  if(slide.img){
    ctx.drawImage(slide.img, 0, 0, canvas.width, canvas.height);
  }

  // 绘制文字
  ctx.fillStyle = "#333";
  ctx.font = "bold 48px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(slide.text.substring(0, 40), canvas.width/2, canvas.height/2);
}

// 3. 用MediaRecorder生成视频
async function recordVideo(slides, duration=3000){
  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm; codecs=vp9"
  });

  const chunks = [];
  recorder.ondataavailable = (e) => chunks.push(e.data);

  return new Promise((resolve) => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      resolve(blob);
    };

    recorder.start();

    let index = 0;
    function drawNext(){
      if(index >= slides.length){
        recorder.stop();
        return;
      }

      drawSlide(slides[index]);
      index++;
      setTimeout(drawNext, duration);
    }

    drawNext();
  });
}

// 进度更新
function setProgress(p,txt){
  $("#progressFill").style.width = p+"%";
  $("#statusTxt").innerText = txt;
}

// 主流程
$("#startBtn").addEventListener("click",async ()=>{
  const file = $("#pptFile").files[0];
  if(!file) return alert("请选择PPTX文件");

  $("#progressBox").style.display="block";
  $("#errorBox").style.display="none";
  $("#resBox").style.display="none";
  $("#startBtn").disabled=true;

  try{
    setProgress(10,"解析PPT：提取图文...");
    const slides = await parsePPTX(file);
    if(!slides.length) throw new Error("未读取到幻灯片");

    setProgress(50,"生成视频...");
    const videoBlob = await recordVideo(slides, 3000);

    setProgress(100,"生成完成");
    const url = URL.createObjectURL(videoBlob);
    $("#downLink").href = url;
    $("#resBox").style.display="block";
  }catch(err){
    $("#errorBox").style.display="block";
    $("#errorBox").innerText = "失败："+err.message;
    console.error(err);
  }finally{
    $("#startBtn").disabled=false;
  }
});
</script>
</body>
</html>
