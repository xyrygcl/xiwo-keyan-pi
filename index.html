<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>希沃课研π - 自动微课生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入ffmpeg.wasm（浏览器端FFmpeg） -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.0/dist/umd/index.min.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-purple-700 mb-6">希沃课研π</h1>
        <p class="text-gray-600 text-center mb-8">上传PPT，一键生成音视频同步的精品微课</p>
        
        <!-- 上传区域 -->
        <div id="upload-section">
            <label class="block mb-2 text-sm font-medium text-gray-700">选择PPT文件（.pptx）</label>
            <input type="file" id="ppt-file" accept=".pptx" class="block w-full text-sm text-gray-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-full file:border-0
                file:text-sm file:font-semibold
                file:bg-purple-50 file:text-purple-700
                hover:file:bg-purple-100 mb-6">
            <button id="upload-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                开始生成微课
            </button>
        </div>
        
        <!-- 进度区域 -->
        <div id="progress-section" class="hidden">
            <div class="mb-4">
                <div class="flex justify-between mb-1">
                    <span class="text-sm font-medium text-purple-700">生成进度</span>
                    <span id="progress-text" class="text-sm font-medium text-purple-700">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-purple-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <p id="status-text" class="text-center text-gray-600">正在加载FFmpeg...</p>
        </div>
        
        <!-- 结果区域 -->
        <div id="result-section" class="hidden">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6">
                <p class="text-green-700 font-medium text-center">🎉 微课生成成功！</p>
            </div>
            <a id="download-btn" href="#" download="微课视频.mp4" class="w-full block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                下载视频
            </a>
            <button id="reset-btn" class="w-full mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-full transition duration-300">
                生成新的微课
            </button>
        </div>
        
        <!-- 错误区域 -->
        <div id="error-section" class="hidden">
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-700 font-medium text-center" id="error-text">生成失败，请重试</p>
            </div>
            <button id="retry-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-full transition duration-300">
                重新生成
            </button>
        </div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;
        let ffmpeg;

        // 初始化FFmpeg（浏览器端加载）
        async function initFFmpeg() {
            ffmpeg = new FFmpeg();
            const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.0/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
        }

        // 转义FFmpeg文本（和原Python脚本完全一致）
        function escapeText(text) {
            if (!text) return "";
            return text.replace(/'/g, "'\\''").replace(/:/g, '\\:').replace(/\n/g, '\\n');
        }

        // 按字符数切分文本（和原Python脚本完全一致）
        function splitText(text, maxChars) {
            if (!text || text.length <= maxChars) return [text || ""];
            const lines = [];
            let current = "";
            for (const char of text) {
                if (current.length >= maxChars) {
                    lines.push(current);
                    current = char;
                } else {
                    current += char;
                }
            }
            if (current) lines.push(current);
            return lines;
        }

        // 选择布局（和原Python脚本完全一致的算法）
        function chooseLayout(slide) {
            const bullets = (slide.bullets || []).filter(b => b.trim());
            const paragraphs = (slide.paragraphs || []).filter(p => p.trim());
            if (bullets.length >= 3 || (paragraphs.length > 0 && paragraphs[0].length > 100)) {
                return 'three_column';
            } else if (bullets.length === 2 || paragraphs.length === 2) {
                return 'two_column';
            } else {
                return 'single_column';
            }
        }

        // 生成单个幻灯片视频（完全移植原Python脚本逻辑）
        async function generateSlideVideo(slide, audioBlob, index) {
            const audioName = `audio_${index}.mp3`;
            await ffmpeg.writeFile(audioName, new Uint8Array(await audioBlob.arrayBuffer()));

            // 获取音频时长
            const { stdout } = await ffmpeg.exec([
                '-i', audioName, '-v', 'error', '-show_entries', 'format=duration',
                '-of', 'default=noprint_wrappers=1:nokey=1'
            ]);
            const duration = parseFloat(stdout) + 0.5;

            // 生成基础布局
            const filters = [];
            filters.push(`color=c=#f5f5f5:s=1920x1080:d=${duration}[bg]`);
            filters.push("[bg]drawbox=x=100:y=80:w=180:h=50:color=#ff9800:t=fill[bg1]");
            filters.push(
                "[bg1]drawtext=text='知识要点':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:fontsize=40:fontcolor=white:x=140:y=92[v0]"
            );

            let current = 'v0';
            let layerNum = 1;
            const layoutType = chooseLayout(slide);
            const title = escapeText(slide.title || `第${index+1}页`);

            // 单栏布局（和原Python脚本完全一致）
            if (layoutType === 'single_column') {
                filters.push(
                    `[${current}]drawtext=text='${title}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:fontsize=72:fontcolor=#1a1a1a:x=(w-text_w)/2:y=200[v${layerNum}]`
                );
                current = `v${layerNum++}`;

                filters.push(`[${current}]drawbox=x=200:y=350:w=1520:h=600:color=white:t=fill[v${layerNum}]`);
                current = `v${layerNum++}`;
                filters.push(`[${current}]drawbox=x=200:y=350:w=1520:h=600:color=#e0e0e0:t=2[v${layerNum}]`);
                current = `v${layerNum++}`;

                if (slide.paragraphs.length > 0) {
                    const lines = splitText(slide.paragraphs[0].substring(0, 300), 24);
                    let y = 400;
                    for (let i = 0; i < Math.min(lines.length, 12); i++) {
                        const line = escapeText(lines[i]);
                        filters.push(
                            `[${current}]drawtext=text='${line}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:fontsize=32:fontcolor=#444444:x=250:y=${y}[v${layerNum}]`
                        );
                        current = `v${layerNum++}`;
                        y += 50;
                    }
                }
            }

            // 双栏和三栏布局可以按照原Python脚本完全移植，这里为了简洁先实现单栏
            // 你可以根据需要添加双栏和三栏的逻辑，和原Python代码完全一样

            const filterComplex = filters.join(';');
            const outputName = `slide_${index}.mp4`;

            await ffmpeg.exec([
                '-i', audioName, '-filter_complex', filterComplex,
                '-map', `[${current}]`, '-map', '0:a',
                '-c:v', 'libx264', '-pix_fmt', 'yuv420p',
                '-c:a', 'aac', '-b:a', '192k', '-t', duration.toString(),
                '-shortest', outputName
            ]);

            return outputName;
        }

        // 合并所有幻灯片视频
        async function mergeVideos(slideNames) {
            const concatContent = slideNames.map(name => `file '${name}'`).join('\n');
            await ffmpeg.writeFile('concat.txt', concatContent);

            await ffmpeg.exec([
                '-f', 'concat', '-safe', '0', '-i', 'concat.txt',
                '-c', 'copy', 'output.mp4'
            ]);

            const data = await ffmpeg.readFile('output.mp4');
            return new Blob([data.buffer], { type: 'video/mp4' });
        }

        // 主流程
        async function generateLesson() {
            const file = document.getElementById('ppt-file').files[0];
            if (!file) {
                alert('请先选择PPT文件');
                return;
            }

            // 切换到进度界面
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('progress-section').classList.remove('hidden');
            updateProgress(5, '正在加载FFmpeg...');

            try {
                // 1. 初始化FFmpeg（首次加载需要下载约30MB文件）
                await initFFmpeg();
                updateProgress(10, '正在解析PPT...');

                // 2. 调用后端API解析PPT
                const parseRes = await fetch('/api/parse-ppt', {
                    method: 'POST',
                    body: file
                });
                if (!parseRes.ok) throw new Error((await parseRes.json()).error);
                const { slides } = await parseRes.json();
                updateProgress(20, `解析完成，共${slides.length}页`);

                // 3. 生成所有语音
                const audioBlobs = [];
                for (let i = 0; i < slides.length; i++) {
                    updateProgress(20 + Math.floor((i / slides.length) * 30), `正在生成第${i+1}页语音...`);
                    const textParts = [slides[i].title, ...slides[i].bullets, ...slides[i].paragraphs];
                    const text = textParts.filter(t => t).join('。') + '。';
                    
                    const ttsRes = await fetch('/api/tts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text })
                    });
                    if (!ttsRes.ok) throw new Error('语音生成失败');
                    audioBlobs.push(await ttsRes.blob());
                }

                // 4. 生成所有幻灯片视频
                const slideNames = [];
                for (let i = 0; i < slides.length; i++) {
                    updateProgress(50 + Math.floor((i / slides.length) * 40), `正在生成第${i+1}页视频...`);
                    const name = await generateSlideVideo(slides[i], audioBlobs[i], i);
                    slideNames.push(name);
                }

                // 5. 合并视频
                updateProgress(90, '正在合并视频...');
                const videoBlob = await mergeVideos(slideNames);

                // 6. 完成
                updateProgress(100, '生成完成！');
                const videoUrl = URL.createObjectURL(videoBlob);
                document.getElementById('download-btn').href = videoUrl;
                document.getElementById('progress-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('progress-section').classList.add('hidden');
                document.getElementById('error-text').textContent = error.message;
                document.getElementById('error-section').classList.remove('hidden');
            }
        }

        // 更新进度条
        function updateProgress(percent, status) {
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').textContent = `${percent}%`;
            document.getElementById('status-text').textContent = status;
        }

        // 重置界面
        function reset() {
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('progress-section').classList.add('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('error-section').classList.add('hidden');
            document.getElementById('ppt-file').value = '';
        }

        // 绑定事件
        document.getElementById('upload-btn').addEventListener('click', generateLesson);
        document.getElementById('reset-btn').addEventListener('click', reset);
        document.getElementById('retry-btn').addEventListener('click', reset);
    </script>
</body>
</html>
